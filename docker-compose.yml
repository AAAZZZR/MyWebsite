version: '3.8'
services:
  backend:
    build: ./backend
    container_name: my-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
  frontend:
    build:
      context: ./frontend
      args:
        API_HOST: http://backend:8000
    container_name: my-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_HOST=http://backend:8000

  nginx:
    image: nginx:alpine
    container_name: my-nginx
    restart: always
    ports:
      - "80:80"  # 只有 Nginx 對外開放 80 port
      - "443:443"
    volumes:
      # 把剛剛寫的設定檔掛載進去
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend