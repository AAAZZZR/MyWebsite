version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: my-redis
    restart: always
  backend:
    build: ./backend
    container_name: my-backend
    restart: always
    depends_on:
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env  # 改成讀取根目錄 .env
    environment:
      - Gemini=${GOOGLE_API_KEY}
      - REDIS_HOST=redis  # 這裡要寫服務名稱 "redis"
      - REDIS_PORT=6379

  frontend:
    build:
      context: ./frontend
      args:
        API_HOST: http://backend:8000
        RESEND_API_KEY: ${RESEND_API_KEY}
    container_name: my-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - API_HOST=http://backend:8000
      - RESEND_API_KEY=${RESEND_API_KEY}

  nginx:
    image: nginx:alpine
    container_name: my-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    # ports:
    #   - "80:80"  # 只有 Nginx 對外開放 80 port
    #   - "443:443"
    # volumes:
    #   # 把剛剛寫的設定檔掛載進去
    #   - ./nginx.conf:/etc/nginx/conf.d/default.conf
    #   - /etc/letsencrypt:/etc/letsencrypt:ro