server {
    listen 80;
    server_name leverag.xyz www.leverag.xyz;
    # 強制將所有 HTTP 請求轉向 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name leverag.xyz www.leverag.xyz;

    # 指向剛才在 volumes 映射進去的路徑
    ssl_certificate /etc/letsencrypt/live/leverag.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leverag.xyz/privkey.pem;

    # AI 服務必備：關閉緩衝以支援 Streaming
    proxy_buffering off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}