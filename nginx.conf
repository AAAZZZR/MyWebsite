server {
    listen 80;
    server_name leverag.xyz www.leverag.xyz game.leverag.xyz news.leverag.xyz;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name leverag.xyz www.leverag.xyz;

    ssl_certificate /etc/letsencrypt/live/leverag.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leverag.xyz/privkey.pem;

    # Required for AI streaming
    proxy_buffering off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    server_name news.leverag.xyz;

    ssl_certificate /etc/letsencrypt/live/leverag.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leverag.xyz/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # RSS endpoints go to backend
    location /rss {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;
    server_name game.leverag.xyz;
    
    ssl_certificate /etc/letsencrypt/live/game.leverag.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.leverag.xyz/privkey.pem;

    location / {
        # Proxy to separate game project on host port 3001
        proxy_pass http://172.17.0.1:3001;

        # WebSocket support for Socket.io
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
