server {
    listen 80;
    server_name leverag.xyz www.leverag.xyz game.leverag.xyz;
    # 強制將所有 HTTP 請求轉向 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name leverag.xyz www.leverag.xyz;

    # 指向剛才在 volumes 映射進去的路徑
    ssl_certificate /etc/letsencrypt/live/leverag.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leverag.xyz/privkey.pem;

    # AI 服務必備：關閉緩衝以支援 Streaming
    proxy_buffering off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
server {
    listen 443 ssl;
    # 這裡填你剛剛在 Lightsail DNS 設定的子網域
    server_name game.leverag.xyz;
    ssl_certificate /etc/letsencrypt/live/game.leverag.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/game.leverag.xyz/privkey.pem;

    location / {
        # [關鍵差異]
        # 因為新遊戲在另一個 Docker 專案，網路不通
        # 所以我們要透過 "172.17.0.1" (Host Gateway) 繞出去找主機的 3001 Port
        proxy_pass http://172.17.0.1:3001;

        # WebSocket 必備 (Socket.io 需要)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 傳遞真實 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
