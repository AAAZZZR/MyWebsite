server {
    listen 80;
    server_name _;

    # ⚠️ 關鍵設定：因為你的 AI 回覆是 Stream (流式傳輸)
    # 必須把 Nginx 的緩衝關掉，不然它會等整句話收完才吐給前端，就沒有打字機效果了
    proxy_buffering off;
    proxy_read_timeout 300s;
    # 1. 前端設定
    location / {
        # ❌ 不能寫 http://127.0.0.1:3000
        # ✅ 要寫 docker-compose.yml 裡面的服務名稱 "frontend"
        proxy_pass http://frontend:3000;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. 後端設定
    location /api/ {
        # ❌ 不能寫 http://127.0.0.1:8000/
        # ✅ 要寫 docker-compose.yml 裡面的服務名稱 "backend"
        # 注意結尾的斜線 / 依然要保留，用來修剪路徑
        proxy_pass http://backend:8000/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}